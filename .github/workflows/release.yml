name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (matches the v-prefixed tag, e.g. 0.1.1)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release?"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Publish Windows x64 self-contained
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can push annotated tags if needed.
          fetch-depth: 0

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish self-contained single-file (win-x64)
        # dotnet publish triggers a restore + build, so no separate restore/build steps.
        run: >
          dotnet publish src/TeamStation.App/TeamStation.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=embedded
          -p:Version=${{ inputs.version }}
          -p:InformationalVersion=${{ inputs.version }}
          -o publish/win-x64

      - name: Sign executable if certificate secrets are configured
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_PFX_B64: ${{ secrets.WINDOWS_SIGNING_CERT_PFX_B64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_PFX_B64) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_PASSWORD)) {
            Write-Host "Signing secrets are not configured; skipping Authenticode signing."
            return
          }

          $certPath = Join-Path $env:RUNNER_TEMP "teamstation-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_PFX_B64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe was not found on the runner." }

          & $signtool.FullName sign `
            /fd SHA256 `
            /td SHA256 `
            /tr http://timestamp.digicert.com `
            /f $certPath `
            /p $env:WINDOWS_SIGNING_CERT_PASSWORD `
            publish/win-x64/TeamStation.exe
          if ($LASTEXITCODE -ne 0) { throw "signtool failed with exit code $LASTEXITCODE" }

      - name: Package
        shell: pwsh
        run: |
          $ver = "${{ inputs.version }}"
          $zip = "TeamStation-v$ver-win-x64.zip"
          Compress-Archive `
            -Path publish/win-x64/TeamStation.exe, LICENSE, README.md, CHANGELOG.md `
            -DestinationPath $zip `
            -Force
          "ARTIFACT=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create tag (if missing)
        shell: pwsh
        run: |
          $tag = "v${{ inputs.version }}"
          $existing = git ls-remote --tags origin $tag
          if (-not $existing) {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag $tag
            git push origin $tag
          } else {
            Write-Host "Tag $tag already exists on origin; skipping tag creation."
          }

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "v${{ inputs.version }}"
          $artifact = $env:ARTIFACT
          # Build argv as an array so empty flags never leak as literal "" args.
          $createArgs = @(
            'release', 'create', $tag,
            '--title', "TeamStation $tag",
            '--notes-file', 'CHANGELOG.md'
          )
          if ("${{ inputs.prerelease }}" -eq "true") { $createArgs += '--prerelease' }

          # Create release if missing, otherwise just re-upload assets.
          gh release view $tag 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            & gh @createArgs
            if ($LASTEXITCODE -ne 0) { throw "gh release create failed with exit code $LASTEXITCODE" }
          } else {
            Write-Host "Release $tag already exists; uploading assets only."
          }

          gh release upload $tag $artifact publish/win-x64/TeamStation.exe --clobber
          if ($LASTEXITCODE -ne 0) { throw "gh release upload failed with exit code $LASTEXITCODE" }
